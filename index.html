<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SmartCNC Scan Lite — Demo</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
    background: #f2f2f7;
    color: #000;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .page-wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 8px 24px;
    border-bottom: 1px solid #d2d2d7;
    margin-bottom: 32px;
  }
  .brand {
    font-size: 18px; font-weight: 500; letter-spacing: -0.01em;
  }
  .brand-sub {
    font-size: 11px; letter-spacing: 0.14em; color: #86868b;
    text-transform: uppercase; margin-top: 2px;
  }
  .step-indicator {
    font-size: 12px; color: #86868b; letter-spacing: 0.08em;
  }
  .reset-link {
    color: #000; font-size: 12px; cursor: pointer;
    text-decoration: underline; margin-left: 16px;
    background: none; border: 0; padding: 0;
    font-family: inherit;
  }
  .ipad-frame {
    background: #1c1c1e;
    border-radius: 32px;
    padding: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    margin: 0 auto;
  }
  .ipad-screen {
    background: #fff;
    border-radius: 18px;
    padding: 40px 44px;
    min-height: 600px;
    position: relative;
    color: #000;
  }
  .step-bar { display: flex; gap: 6px; margin-bottom: 32px; }
  .step-dot { flex: 1; height: 3px; background: #e5e5ea; border-radius: 2px; transition: background 0.4s; }
  .step-dot.active { background: #000; }
  .step-label { font-size: 11px; letter-spacing: 0.12em; color: #86868b; margin-bottom: 8px; text-transform: uppercase; }
  .screen-title { font-size: 36px; font-weight: 500; letter-spacing: -0.02em; margin: 0 0 36px; color: #000; }
  .field-block { margin-bottom: 24px; }
  .field-label { font-size: 11px; letter-spacing: 0.12em; color: #86868b; margin-bottom: 10px; text-transform: uppercase; }
  .field-row { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .field-input {
    font-size: 36px; font-weight: 400; color: #000;
    min-width: 90px; max-width: 130px;
    padding: 4px 10px;
    border: 0; border-bottom: 1px solid #000;
    background: transparent;
    font-family: inherit;
    -webkit-appearance: none;
  }
  .field-input:focus { outline: none; border-bottom: 2px solid #000; }
  .field-input::-webkit-inner-spin-button, .field-input::-webkit-outer-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .field-unit { font-size: 14px; color: #6e6e73; }
  .field-x { font-size: 20px; color: #86868b; }
  .field-hint { font-size: 12px; color: #86868b; margin-top: 8px; letter-spacing: 0.04em; }
  .summary {
    border-top: 1px solid #000;
    margin-top: 32px; padding-top: 24px;
    display: flex; justify-content: space-between; gap: 24px;
  }
  .summary-row { display: flex; flex-direction: column; }
  .summary-label { font-size: 10px; letter-spacing: 0.14em; color: #86868b; text-transform: uppercase; margin-bottom: 6px; }
  .summary-value { font-size: 24px; font-weight: 400; }
  .btn-primary {
    display: block; width: 100%; padding: 24px;
    background: #000; color: #fff; border: 0;
    border-radius: 14px;
    font-size: 16px; letter-spacing: 0.12em; font-weight: 500;
    text-transform: uppercase;
    cursor: pointer; margin-top: 36px;
    transition: transform 0.15s, opacity 0.2s;
    font-family: inherit;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: #c7c7cc; cursor: not-allowed; }
  .file-pill {
    background: #f5f5f7; border-radius: 14px;
    padding: 20px 22px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; gap: 16px;
  }
  .file-name { font-size: 15px; font-weight: 500; word-break: break-all; }
  .file-meta { font-size: 11px; color: #86868b; margin-top: 4px; letter-spacing: 0.08em; }
  .share-btn {
    background: #000; color: #fff; border: 0;
    padding: 10px 18px; border-radius: 8px;
    font-size: 11px; letter-spacing: 0.12em; font-weight: 500;
    text-transform: uppercase; cursor: pointer;
    font-family: inherit; flex-shrink: 0;
  }
  .proc-list { list-style: none; padding: 0; margin: 28px 0; counter-reset: step; }
  .proc-list li {
    counter-increment: step;
    padding: 14px 0 14px 42px; position: relative;
    font-size: 15px; color: #1d1d1f;
    border-top: 1px solid #f5f5f7;
  }
  .proc-list li:first-child { border-top: 0; }
  .proc-list li::before {
    content: counter(step);
    position: absolute; left: 0; top: 14px;
    width: 26px; height: 26px;
    border: 1px solid #000; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
  }
  .countdown-wrap { text-align: center; padding: 60px 0; }
  .countdown-label { font-size: 11px; letter-spacing: 0.16em; color: #86868b; text-transform: uppercase; margin-bottom: 20px; }
  .countdown-num { font-size: 180px; font-weight: 300; letter-spacing: -0.04em; line-height: 1; }
  .acq-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 36px; align-items: start; }
  .heatmap-canvas {
    width: 100%; aspect-ratio: 1500/800;
    border: 1px solid #000; border-radius: 8px;
    background: #fafafa; display: block;
  }
  .live-stats { display: flex; flex-direction: column; gap: 20px; }
  .stat-block { padding: 16px 0; border-bottom: 1px solid #f0f0f2; }
  .stat-block:last-child { border-bottom: 0; }
  .stat-label { font-size: 10px; letter-spacing: 0.14em; color: #86868b; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 400; }
  .algo-list { display: flex; flex-direction: column; gap: 12px; margin: 18px 0 28px; }
  .algo-row {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px;
    border: 1px solid #d2d2d7; border-radius: 14px;
    cursor: pointer; transition: border-color 0.2s;
  }
  .algo-row.selected { border: 1.5px solid #000; }
  .algo-radio {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid #000; flex-shrink: 0; position: relative;
  }
  .algo-row.selected .algo-radio::after {
    content: ''; position: absolute; inset: 3px;
    background: #000; border-radius: 50%;
  }
  .algo-name { font-size: 15px; font-weight: 500; }
  .algo-desc { font-size: 12px; color: #86868b; margin-top: 3px; letter-spacing: 0.04em; }
  .preview-canvas {
    width: 100%; height: 200px;
    border: 1px solid #d2d2d7; border-radius: 8px;
    background: #fafafa; margin: 18px 0; display: block;
  }
  .success-mark {
    width: 64px; height: 64px;
    border: 2px solid #000; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 12px auto 28px;
  }
  .success-mark::after {
    content: ''; width: 22px; height: 14px;
    border-left: 2.5px solid #000; border-bottom: 2.5px solid #000;
    transform: translateY(-2px) rotate(-45deg);
  }
  .export-list {
    background: #f5f5f7; border-radius: 14px;
    padding: 22px; margin: 18px 0;
  }
  .export-row {
    display: flex; justify-content: space-between;
    padding: 12px 0; font-size: 14px;
    border-bottom: 1px solid #e5e5ea;
    gap: 12px;
  }
  .export-row:last-child { border-bottom: 0; }
  .export-row span:first-child {
    color: #86868b; letter-spacing: 0.08em;
    text-transform: uppercase; font-size: 11px;
    flex-shrink: 0;
  }
  .export-row span:last-child {
    font-weight: 400; text-align: right;
  }
  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .footer-note {
    text-align: center; padding: 32px 16px 0;
    font-size: 11px; color: #86868b;
    letter-spacing: 0.06em;
  }
  .footer-note strong { font-weight: 500; color: #000; }

  @media (max-width: 768px) {
    .page-wrap { padding: 12px 8px 24px; }
    .ipad-frame { padding: 8px; border-radius: 20px; }
    .ipad-screen { padding: 24px 20px; border-radius: 14px; min-height: 500px; }
    .screen-title { font-size: 26px; margin-bottom: 24px; }
    .field-input { font-size: 26px; min-width: 70px; }
    .countdown-num { font-size: 120px; }
    .acq-grid { grid-template-columns: 1fr; gap: 20px; }
    .stat-value { font-size: 22px; }
    .header { flex-direction: column; gap: 8px; align-items: flex-start; padding-bottom: 16px; }
  }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="header">
    <div>
      <div class="brand">SmartCNC Scan Lite</div>
      <div class="brand-sub">Demo interattiva · Workflow di compensazione planarità</div>
    </div>
    <div>
      <span class="step-indicator" id="step-indicator">Passo 1 di 4</span>
      <button class="reset-link" id="reset-btn">Riavvia demo</button>
    </div>
  </div>

  <div class="ipad-frame">
    <div class="ipad-screen" id="screen-root"></div>
  </div>

  <div class="footer-note">
    <strong>SMARTCNC AUTOMAZIONI</strong> &middot; Gussago (BS) &middot; Demo concept &middot; Tutti i dati sono simulati
  </div>
</div>

<script>
(function(){
  const root = document.getElementById('screen-root');
  const stepInd = document.getElementById('step-indicator');
  const resetBtn = document.getElementById('reset-btn');
  const initialState = { step: 1, dimX: 1500, dimY: 800, gridX: 20, gridY: 12, feed: 3000, zSafe: 50, algo: 'tps', acquired: 0, devMax: 0, devMin: 0 };
  let state = Object.assign({}, initialState);
  let timers = [];

  function clearTimers(){ timers.forEach(t => { clearTimeout(t); clearInterval(t); }); timers = []; }

  function stepBar(active){
    let html = '<div class="step-bar">';
    for (let i = 1; i <= 4; i++) html += '<div class="step-dot' + (i <= active ? ' active' : '') + '"></div>';
    html += '</div>';
    return html;
  }

  function pointsTotal(){ return state.gridX * state.gridY; }
  function resolution(){ return [Math.round(state.dimX/state.gridX), Math.round(state.dimY/state.gridY)]; }
  function scanTimeSec(){
    const passes = state.gridY;
    const lengthX = state.dimX * passes;
    const lengthY = (state.dimY / state.gridY) * (passes - 1);
    const totalMm = lengthX + lengthY;
    return Math.round((totalMm / state.feed) * 60);
  }
  function fmtTime(s){ const m = Math.floor(s/60); const r = s % 60; return m + 'm ' + String(r).padStart(2,'0') + 's'; }

  function render(){
    clearTimers();
    stepInd.textContent = 'Passo ' + Math.min(state.step,4) + ' di 4';
    if (state.step === 1) renderStep1();
    else if (state.step === 2) renderStep2();
    else if (state.step === 3) renderStep3();
    else if (state.step === 4) renderStep4();
    else if (state.step === 5) renderStep5();
  }

  function renderStep1(){
    const r = resolution();
    root.innerHTML = stepBar(1) +
      '<div class="step-label fade-in">Definisci · Passo 1</div>' +
      '<h1 class="screen-title fade-in">Area di scansione</h1>' +
      '<div class="fade-in">' +
        '<div class="field-block">' +
          '<div class="field-label">Dimensioni pezzo</div>' +
          '<div class="field-row">' +
            '<input class="field-input" id="dimX" value="' + state.dimX + '" type="number" inputmode="numeric" />' +
            '<span class="field-x">×</span>' +
            '<input class="field-input" id="dimY" value="' + state.dimY + '" type="number" inputmode="numeric" />' +
            '<span class="field-unit">mm</span>' +
          '</div>' +
        '</div>' +
        '<div class="field-block">' +
          '<div class="field-label">Griglia di scansione</div>' +
          '<div class="field-row">' +
            '<input class="field-input" id="gridX" value="' + state.gridX + '" type="number" inputmode="numeric" />' +
            '<span class="field-x">×</span>' +
            '<input class="field-input" id="gridY" value="' + state.gridY + '" type="number" inputmode="numeric" />' +
            '<span class="field-unit">punti</span>' +
          '</div>' +
          '<div class="field-hint">Risoluzione ' + r[0] + ' × ' + r[1] + ' mm · ' + pointsTotal() + ' punti totali</div>' +
        '</div>' +
        '<div class="field-block">' +
          '<div class="field-label">Velocità scansione</div>' +
          '<div class="field-row">' +
            '<input class="field-input" id="feed" value="' + state.feed + '" type="number" inputmode="numeric" />' +
            '<span class="field-unit">mm/min</span>' +
          '</div>' +
        '</div>' +
        '<div class="summary">' +
          '<div class="summary-row">' +
            '<span class="summary-label">Punti totali</span>' +
            '<span class="summary-value" id="sumPoints">' + pointsTotal() + '</span>' +
          '</div>' +
          '<div class="summary-row">' +
            '<span class="summary-label">Tempo stimato</span>' +
            '<span class="summary-value" id="sumTime">' + fmtTime(scanTimeSec()) + '</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<button class="btn-primary fade-in" id="genBtn">Genera G-code scansione</button>';

    ['dimX','dimY','gridX','gridY','feed'].forEach(function(id){
      document.getElementById(id).addEventListener('input', function(e){
        const v = parseInt(e.target.value) || 0;
        state[id] = v;
        const rr = resolution();
        document.querySelector('.field-hint').textContent = 'Risoluzione ' + rr[0] + ' × ' + rr[1] + ' mm · ' + pointsTotal() + ' punti totali';
        document.getElementById('sumPoints').textContent = pointsTotal();
        document.getElementById('sumTime').textContent = fmtTime(scanTimeSec());
      });
    });
    document.getElementById('genBtn').addEventListener('click', function(){ state.step = 2; render(); });
  }

  function renderStep2(){
    const fname = 'SCAN_' + state.dimX + 'x' + state.dimY + '_' + pointsTotal() + 'PT.nc';
    root.innerHTML = stepBar(2) +
      '<div class="step-label fade-in">Trasferisci · Passo 2</div>' +
      '<h1 class="screen-title fade-in">Carica sul CNC e avvia</h1>' +
      '<div class="fade-in">' +
        '<div class="file-pill">' +
          '<div>' +
            '<div class="file-name">' + fname + '</div>' +
            '<div class="file-meta">' + pointsTotal() + ' punti · ' + fmtTime(scanTimeSec()) + '</div>' +
          '</div>' +
          '<button class="share-btn" id="shareBtn">Condividi</button>' +
        '</div>' +
        '<div class="field-label" style="margin-top: 8px;">Procedura</div>' +
        '<ol class="proc-list">' +
          '<li>Trasferisci il file al CNC</li>' +
          '<li>Posiziona la testa al punto X0 Y0</li>' +
          '<li>Tocca Avvia qui sotto</li>' +
          '<li>Premi Start sul CNC entro 3 secondi</li>' +
        '</ol>' +
      '</div>' +
      '<button class="btn-primary fade-in" id="startBtn">Avvia acquisizione laser</button>';

    document.getElementById('shareBtn').addEventListener('click', function(){
      const b = document.getElementById('shareBtn');
      const orig = b.textContent;
      b.textContent = 'Inviato';
      timers.push(setTimeout(function(){ b.textContent = orig; }, 1400));
    });
    document.getElementById('startBtn').addEventListener('click', function(){ state.step = 3; render(); });
  }

  function renderStep3(){
    root.innerHTML = stepBar(3) +
      '<div class="step-label fade-in">Sincronizza · Passo 3</div>' +
      '<h1 class="screen-title fade-in">Premi Start sul CNC</h1>' +
      '<div class="countdown-wrap fade-in">' +
        '<div class="countdown-label">Acquisizione tra</div>' +
        '<div class="countdown-num" id="cd">3</div>' +
      '</div>';

    let n = 3;
    const cdEl = document.getElementById('cd');
    timers.push(setInterval(function(){
      n--;
      if (n > 0) cdEl.textContent = n;
      else { clearTimers(); renderAcquisition(); }
    }, 800));
  }

  function renderAcquisition(){
    const total = pointsTotal();
    const totalT = scanTimeSec();
    state.acquired = 0; state.devMax = 0; state.devMin = 0;

    root.innerHTML = stepBar(3) +
      '<div class="step-label fade-in">Acquisizione · Passo 3</div>' +
      '<h1 class="screen-title fade-in">Scansione in corso</h1>' +
      '<div class="acq-grid fade-in">' +
        '<canvas class="heatmap-canvas" id="heat" width="600" height="320"></canvas>' +
        '<div class="live-stats">' +
          '<div class="stat-block">' +
            '<div class="stat-label">Punti acquisiti</div>' +
            '<div class="stat-value" id="sAcq">0 / ' + total + '</div>' +
          '</div>' +
          '<div class="stat-block">' +
            '<div class="stat-label">Tempo</div>' +
            '<div class="stat-value" id="sTime">0m 00s / ' + fmtTime(totalT) + '</div>' +
          '</div>' +
          '<div class="stat-block">' +
            '<div class="stat-label">Deviazione max</div>' +
            '<div class="stat-value" id="sMax">+0.000 mm</div>' +
          '</div>' +
          '<div class="stat-block">' +
            '<div class="stat-label">Deviazione min</div>' +
            '<div class="stat-value" id="sMin">−0.000 mm</div>' +
          '</div>' +
        '</div>' +
      '</div>';

    const canvas = document.getElementById('heat');
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#fafafa';
    ctx.fillRect(0,0,w,h);

    const cellW = w / state.gridX;
    const cellH = h / state.gridY;

    const heightMap = [];
    for (let i = 0; i < state.gridX; i++){
      heightMap[i] = [];
      for (let j = 0; j < state.gridY; j++){
        const cx = (i / state.gridX) - 0.5;
        const cy = (j / state.gridY) - 0.5;
        const z = 0.6 * Math.sin(cx * 4) * Math.cos(cy * 3) + 0.3 * Math.sin(cx * 7 + cy * 5) + (Math.random() - 0.5) * 0.15;
        heightMap[i][j] = z;
      }
    }

    const order = [];
    for (let j = 0; j < state.gridY; j++){
      for (let i = 0; i < state.gridX; i++){
        const ix = (j % 2 === 0) ? i : (state.gridX - 1 - i);
        order.push([ix, j]);
      }
    }

    let idx = 0;
    const acqEl = document.getElementById('sAcq');
    const timeEl = document.getElementById('sTime');
    const maxEl = document.getElementById('sMax');
    const minEl = document.getElementById('sMin');

    const totalDurationMs = 5000;
    const tickMs = 50;
    const ticksTotal = totalDurationMs / tickMs;
    const pointsPerTick = Math.max(1, Math.ceil(total / ticksTotal));

    timers.push(setInterval(function(){
      if (idx >= order.length){
        clearTimers();
        timers.push(setTimeout(showAcqDone, 700));
        return;
      }
      for (let b = 0; b < pointsPerTick && idx < order.length; b++){
        const point = order[idx];
        const i = point[0], j = point[1];
        const z = heightMap[i][j];
        const intensity = Math.min(1, Math.abs(z));
        const alpha = 0.12 + intensity * 0.78;
        const drawY = h - (j + 1) * cellH;
        ctx.fillStyle = 'rgba(30,30,30,' + alpha + ')';
        ctx.fillRect(i * cellW, drawY, cellW + 0.5, cellH + 0.5);
        idx++;
        if (z > state.devMax) state.devMax = z;
        if (z < state.devMin) state.devMin = z;
      }
      state.acquired = idx;
      const progress = idx / order.length;
      const simSec = Math.round(progress * totalT);
      acqEl.textContent = idx + ' / ' + order.length;
      timeEl.textContent = fmtTime(simSec) + ' / ' + fmtTime(totalT);
      maxEl.textContent = (state.devMax >= 0 ? '+' : '') + state.devMax.toFixed(3) + ' mm';
      minEl.textContent = (state.devMin >= 0 ? '+' : '−') + Math.abs(state.devMin).toFixed(3) + ' mm';
    }, tickMs));
  }

  function showAcqDone(){
    const delta = (state.devMax - state.devMin).toFixed(3);
    root.innerHTML = stepBar(3) +
      '<div class="step-label fade-in">Completato · Passo 3</div>' +
      '<h1 class="screen-title fade-in">Scansione completata</h1>' +
      '<div class="success-mark fade-in"></div>' +
      '<div class="export-list fade-in">' +
        '<div class="export-row"><span>Punti validi</span><span>' + pointsTotal() + ' / ' + pointsTotal() + '</span></div>' +
        '<div class="export-row"><span>Deviazione max</span><span>+' + state.devMax.toFixed(3) + ' mm</span></div>' +
        '<div class="export-row"><span>Deviazione min</span><span>−' + Math.abs(state.devMin).toFixed(3) + ' mm</span></div>' +
        '<div class="export-row"><span>Delta totale</span><span>' + delta + ' mm</span></div>' +
      '</div>' +
      '<button class="btn-primary fade-in" id="loadProgBtn">Carica programma di lavoro</button>';

    document.getElementById('loadProgBtn').addEventListener('click', function(){ state.step = 4; render(); });
  }

  function renderStep4(){
    root.innerHTML = stepBar(4) +
      '<div class="step-label fade-in">Compensa · Passo 4</div>' +
      '<h1 class="screen-title fade-in">Compensa G-code</h1>' +
      '<div class="fade-in">' +
        '<div class="file-pill">' +
          '<div>' +
            '<div class="file-name">LAPIDE_ROSSI_2026.nc</div>' +
            '<div class="file-meta">2.847 linee · ~38m 00s</div>' +
          '</div>' +
          '<button class="share-btn" id="reloadBtn">Cambia</button>' +
        '</div>' +
        '<div class="field-label" style="margin-top: 18px;">Algoritmo</div>' +
        '<div class="algo-list">' +
          '<div class="algo-row' + (state.algo==='tps'?' selected':'') + '" data-algo="tps">' +
            '<div class="algo-radio"></div>' +
            '<div>' +
              '<div class="algo-name">Thin plate spline</div>' +
              '<div class="algo-desc">Migliore per superfici lisce · consigliato</div>' +
            '</div>' +
          '</div>' +
          '<div class="algo-row' + (state.algo==='lin'?' selected':'') + '" data-algo="lin">' +
            '<div class="algo-radio"></div>' +
            '<div>' +
              '<div class="algo-name">Lineare a triangoli</div>' +
              '<div class="algo-desc">Veloce · marmo con discontinuità</div>' +
            '</div>' +
          '</div>' +
          '<div class="algo-row' + (state.algo==='bic'?' selected':'') + '" data-algo="bic">' +
            '<div class="algo-radio"></div>' +
            '<div>' +
              '<div class="algo-name">Bicubico</div>' +
              '<div class="algo-desc">Bilanciato · uso generale</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="field-label">Anteprima compensazione</div>' +
        '<canvas class="preview-canvas" id="prev" width="600" height="200"></canvas>' +
      '</div>' +
      '<button class="btn-primary fade-in" id="genCompBtn">Genera G-code compensato</button>';

    document.querySelectorAll('.algo-row').forEach(function(row){
      row.addEventListener('click', function(){
        state.algo = row.dataset.algo;
        document.querySelectorAll('.algo-row').forEach(function(r){ r.classList.remove('selected'); });
        row.classList.add('selected');
      });
    });
    drawPreview();
    document.getElementById('genCompBtn').addEventListener('click', simulateCompensation);
  }

  function drawPreview(){
    const canvas = document.getElementById('prev');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#fafafa';
    ctx.fillRect(0,0,w,h);

    for (let i = 0; i < state.gridX; i++){
      for (let j = 0; j < state.gridY; j++){
        const cx = (i / state.gridX) - 0.5;
        const cy = (j / state.gridY) - 0.5;
        const z = 0.6 * Math.sin(cx * 4) * Math.cos(cy * 3) + 0.3 * Math.sin(cx * 7 + cy * 5);
        const intensity = Math.min(1, Math.abs(z));
        const drawY = h - (j + 1) * (h/state.gridY);
        ctx.fillStyle = 'rgba(30,30,30,' + (0.08 + intensity * 0.5) + ')';
        ctx.fillRect(i * (w/state.gridX), drawY, w/state.gridX + 0.5, h/state.gridY + 0.5);
      }
    }
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    let first = true;
    for (let t = 0; t < 1; t += 0.005){
      const x = 30 + (w - 60) * t;
      const y = h/2 + 40 * Math.sin(t * 18) + 25 * Math.cos(t * 7);
      if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  function simulateCompensation(){
    const btn = document.getElementById('genCompBtn');
    btn.disabled = true;
    btn.textContent = 'Compensazione in corso…';
    let pct = 0;
    timers.push(setInterval(function(){
      pct += Math.random() * 18 + 8;
      if (pct >= 100){
        pct = 100;
        clearTimers();
        btn.textContent = 'Compensazione completata · 100%';
        timers.push(setTimeout(function(){ state.step = 5; render(); }, 700));
      } else {
        btn.textContent = 'Compensazione in corso · ' + Math.round(pct) + '%';
      }
    }, 140));
  }

  function renderStep5(){
    const algoName = state.algo === 'tps' ? 'Thin plate spline' : state.algo === 'lin' ? 'Lineare a triangoli' : 'Bicubico';
    root.innerHTML = stepBar(4) +
      '<div class="step-label fade-in">Pronto · Esportato</div>' +
      '<h1 class="screen-title fade-in">G-code compensato</h1>' +
      '<div class="success-mark fade-in"></div>' +
      '<div class="fade-in">' +
        '<div class="file-pill">' +
          '<div>' +
            '<div class="file-name">LAPIDE_ROSSI_2026_COMP.nc</div>' +
            '<div class="file-meta">2.847 linee · ' + algoName + ' · ' + state.devMax.toFixed(3) + '/' + Math.abs(state.devMin).toFixed(3) + ' mm</div>' +
          '</div>' +
          '<button class="share-btn" id="exportBtn">Esporta</button>' +
        '</div>' +
        '<div class="export-list">' +
          '<div class="export-row"><span>Algoritmo</span><span>' + algoName + '</span></div>' +
          '<div class="export-row"><span>Punti riferimento</span><span>' + pointsTotal() + '</span></div>' +
          '<div class="export-row"><span>Linee modificate</span><span>2.847 / 2.847</span></div>' +
          '<div class="export-row"><span>Range correzione Z</span><span>' + (state.devMax - state.devMin).toFixed(3) + ' mm</span></div>' +
        '</div>' +
      '</div>' +
      '<button class="btn-primary fade-in" id="restartBtn">Nuova scansione</button>';

    document.getElementById('exportBtn').addEventListener('click', function(){
      const b = document.getElementById('exportBtn');
      const orig = b.textContent;
      b.textContent = 'Esportato';
      timers.push(setTimeout(function(){ b.textContent = orig; }, 1400));
    });
    document.getElementById('restartBtn').addEventListener('click', function(){
      state = Object.assign({}, initialState);
      render();
    });
  }

  resetBtn.addEventListener('click', function(){
    state = Object.assign({}, initialState);
    render();
  });

  render();
})();
</script>
</body>
</html>
